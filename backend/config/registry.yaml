version: 2026-04-23

llms:
  chat_default:
    provider: openai
    model: gpt-4.1-mini
  gemini_flash:
    provider: gemini
    model: gemini-2.5-flash
  gemini_flash_lite:
    provider: gemini
    model: gemini-2.5-flash-lite
  gemini_pro:
    provider: gemini
    model: gemini-2.5-pro

embedding_defaults:
  default: openai-small
  multilingual: openai-small
  local_fallback: openai-small

embeddings:
  openai-small:
    provider: openai
    model: text-embedding-3-small
    dimensions: 1536
    qdrant_collection: docs_openai_small_1536
  openai-large:
    provider: openai
    model: text-embedding-3-large
    dimensions: 3072
    qdrant_collection: docs_openai_large_3072

parsers:
  hot: fast
  cold_default: fast
  cold_scanned: fast
